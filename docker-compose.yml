version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: community_hero_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - community_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: community_hero_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/community_hero
      - JWT_SECRET=supersecret_hackathon_key
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - community_network
    volumes:
      - ./backend/uploads:/app/uploads

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: community_hero_ai_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    networks:
      - community_network

networks:
  community_network:
    driver: bridge

volumes:
  mongo_data:
